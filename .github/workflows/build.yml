name: Build Android APK

on:
  push:
    branches: [ main, master ]
  pull_request:
    branches: [ main, master ]
  workflow_dispatch:

jobs:
  build-apk:
    name: Build APK with Buildozer
    runs-on: ubuntu-22.04

    steps:
      # ── 1. Checkout ────────────────────────────────────────────────────
      - name: Checkout repository
        uses: actions/checkout@v4

      # ── 2. Python setup ────────────────────────────────────────────────
      - name: Set up Python 3.10
        uses: actions/setup-python@v5
        with:
          python-version: "3.10"

      # ── 3. System dependencies for Buildozer / Android SDK ────────────
      - name: Install system dependencies
        run: |
          sudo apt-get update -qq
          sudo apt-get install -y --no-install-recommends \
            git zip unzip openjdk-17-jdk \
            autoconf automake libtool pkg-config \
            libltdl-dev libffi-dev libssl-dev \
            python3-pip python3-setuptools \
            libgdbm-dev libncurses5-dev \
            cmake ninja-build ccache \
            libsqlite3-dev zlib1g-dev
          sudo apt-get clean

      # ── 4. Cache Buildozer global directory (~/.buildozer) ────────────
      - name: Cache Buildozer global dir
        uses: actions/cache@v4
        with:
          path: ~/.buildozer
          key: buildozer-${{ runner.os }}-${{ hashFiles('buildozer.spec') }}
          restore-keys: |
            buildozer-${{ runner.os }}-

      # ── 5. Cache pip packages ─────────────────────────────────────────
      - name: Cache pip
        uses: actions/cache@v4
        with:
          path: ~/.cache/pip
          key: pip-${{ runner.os }}-${{ hashFiles('requirements.txt') }}
          restore-keys: |
            pip-${{ runner.os }}-

      # ── 6. Install Buildozer & Cython ─────────────────────────────────
      - name: Install Buildozer
        run: |
          pip install --upgrade pip
          pip install buildozer cython virtualenv

      # ── 7. Build debug APK ────────────────────────────────────────────
      - name: Build debug APK
        run: |
          buildozer -v android debug
        env:
          ANDROID_SDK_ROOT: ${{ github.workspace }}/.buildozer/android/platform/android-sdk

      # ── 8. Upload APK as artifact ─────────────────────────────────────
      - name: Upload APK
        uses: actions/upload-artifact@v4
        with:
          name: perspective-crop-debug-apk
          path: bin/*.apk
          if-no-files-found: error
          retention-days: 30
